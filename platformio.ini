; PlatformIO Project Configuration File
;
; ESP32-S3-N16R8 (16MB Flash + 8MB PSRAM, dual USB)
;   - USB-OTG port  -> connected to HP M1136 (USB Host)
;   - USB-Serial-JTAG -> used for log / flashing
;
; Build options: build flags, source filter
; Upload options: custom upload port, speed and extra flags
; Library options: dependencies, extra library storages
; Advanced options: extra scripting

[env:esp32-s3-n16r8]
platform              = espressif32
board                 = esp32-s3-devkitc-1
framework             = arduino, espidf
monitor_speed         = 115200
upload_speed          = 921600

; --- 16MB flash, 8MB PSRAM (octal) ---
board_upload.flash_size = 16MB
board_build.partitions  = huge_app.csv
board_build.f_cpu       = 240000000L
board_build.f_flash     = 80000000L
board_build.flash_mode  = qio
board_build.arduino.memory_type = qio_opi
board_build.psram_type  = opi

build_flags =
    -DBOARD_HAS_PSRAM
    -DCONFIG_SPIRAM_MODE_OCT
    ; Arduino USB stack must NOT take over the OTG PHY (we use it for Host)
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DARDUINO_USB_DFU_ON_BOOT=0
    -DARDUINO_USB_MSC_ON_BOOT=0
    ; Route Arduino Serial to the built-in USB-Serial-JTAG controller
    -DARDUINO_USB_SERIAL_JTAG_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3
    -std=gnu++17
build_unflags =
    -std=gnu++11
    -DARDUINO_USB_MODE=1

; sdkconfig overrides for ESP-IDF side (USB Host + PSRAM tuning)
board_build.embed_files =
