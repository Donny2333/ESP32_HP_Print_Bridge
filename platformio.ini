; PlatformIO Project Configuration File
;
; ESP32-S3-N16R8 (16MB Flash + 8MB PSRAM, dual USB)
;   - USB-OTG port  -> connected to HP M1136 (USB Host)
;   - USB-Serial-JTAG -> used for log / flashing
;
; Build options: build flags, source filter
; Upload options: custom upload port, speed and extra flags
; Library options: dependencies, extra library storages
; Advanced options: extra scripting

[platformio]
default_envs = esp32-s3-n16r8

[env:esp32-s3-n16r8]
platform              = espressif32
board                 = esp32-s3-devkitc-1
framework             = arduino, espidf
monitor_speed         = 115200
upload_speed          = 921600
extra_scripts         = pre:scripts/version.py

; Native (host) unit tests live under test/test_native and pull in the native
; shims; never try to run them on the device.
test_ignore           = test_native

; --- 16MB flash, 8MB PSRAM (octal) ---
board_upload.flash_size = 16MB
board_build.partitions  = ota_16mb.csv
board_build.f_cpu       = 240000000L
board_build.f_flash     = 80000000L
board_build.flash_mode  = qio
board_build.arduino.memory_type = qio_opi
board_build.psram_type  = opi

build_flags =
    -DBOARD_HAS_PSRAM
    -DCONFIG_SPIRAM_MODE_OCT
    ; Arduino USB stack must NOT take over the OTG PHY (we use it for Host)
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DARDUINO_USB_DFU_ON_BOOT=0
    -DARDUINO_USB_MSC_ON_BOOT=0
    ; Route Arduino Serial to the built-in USB-Serial-JTAG controller
    -DARDUINO_USB_SERIAL_JTAG_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3
    -std=gnu++17
build_unflags =
    -std=gnu++11
    -DARDUINO_USB_MODE=1

; sdkconfig overrides for ESP-IDF side (USB Host + PSRAM tuning)
board_build.embed_files =

; -----------------------------------------------------------------------------
; Native host environment: runs the pure-logic unit tests (job_log, log_sink)
; on the build machine via Unity.  No board, no flashing.
;
;   pio test -e native
;
; The tested src/*.cpp are compiled against header-only shims in test/shims
; (FreeRTOS critical sections -> no-ops, esp_timer -> fake clock, esp_log /
; Arduino Serial -> capture buffers), so no ESP-IDF or hardware is required.
; -----------------------------------------------------------------------------
[env:native]
platform   = native
test_framework = unity
test_build_src = yes
build_flags =
    -std=gnu++17
    -I test/shims
    -I src
build_src_filter =
    +<job_log.cpp>
    +<log_sink.cpp>

[env:esp32-s3-n16r8-ota]
extends = env:esp32-s3-n16r8
upload_protocol = espota
upload_port = esp32-printer.local
upload_flags =
    --auth=${sysenv.ESP32_OTA_PASSWORD}
